<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quantum Self</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div id="three-container"></div>
    <div id="transition-flash"></div>
    <div id="warp-overlay"></div>

    <!-- Welcome screen - shown once on first visit -->
    <div id="welcome-screen">
        <div id="welcome-content">
            <div id="welcome-title">
                <span class="welcome-quantum">QUANTUM</span>
                <span class="welcome-self">SELF</span>
            </div>
            <p id="welcome-subtitle">A journey through infinite versions of you</p>

            <div class="welcome-divider"></div>

            <div id="welcome-how-to">
                <h2>HOW TO NAVIGATE</h2>
                <ul>
                    <li><span class="key">W / S</span> Move forward &amp; back</li>
                    <li><span class="key">A / D</span> Move left &amp; right</li>
                    <li><span class="key">R / F</span> Ascend &amp; descend</li>
                    <li><span class="key">HOLD + DRAG MOUSE</span>Look around</li>
                </ul>
            </div>

            <div class="welcome-divider"></div>

            <p id="welcome-hint">Click the monitor to begin. Type <span class="inline-key">start</span> when ready.</p>

            <button id="welcome-enter-btn">ENTER THE SYSTEM</button>
        </div>
    </div>

    <div id="terminal">
        <div class="crt-screen">
            <div id="terminal-output"></div>
            <div id="terminal-input-row">
                <span id="input-prompt"></span><span id="input-display"></span><span class="cursor"></span>
            </div>
        </div>
    </div>

    <div id="multiverse-ui"></div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
