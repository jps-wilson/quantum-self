<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quantum Self</title>

    <!-- Retro terminal fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- CSS file -->
    <link rel="stylesheet" href="src/style.css">
</head>

<body>
    <!-- CRT Monitor Housing -->
    <div class="crt-monitor">
        <!-- CRT Screen (with scan lines, glow effects) -->
        <div class="crt-screen">
            <!-- Terminal Window Header -->
            <div class="terminal-header">
                <div class="window-controls">
                    <span class="window-button close"></span>
                    <span class="window-button minimize"></span>
                    <span class="window-button maximize"></span>
                </div>
                <div class="terminal-title">QUANTUM_TERMINAL v2.4.1</div>
            </div>

            <!-- Terminal Body (where text will appear) -->
            <div class="terminal-body" id="terminal">
                <!-- JavaScript will add content here -->
            </div>
        </div>
    </div>

    <!-- Three.js will render here later -->
    <div id="three-container"></div>

    <!-- Javascript link -->
    <script type="module" src="/src/main.js"></script>
</body>

</html>
